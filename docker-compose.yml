version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: spotify_podcast_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: spotify_podcast
      MYSQL_USER: spotify_user
      MYSQL_PASSWORD: spotifypassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data:
