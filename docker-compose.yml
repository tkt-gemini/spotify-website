version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: spotify_clone_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: spotify_clone
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: spotify_clone_adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  db_data: